<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Ahola Transport – WAY AHEAD Pong</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
  :root { --red: #CB043E; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #181818;
    font-family: 'Barlow', sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  header {
    width: 100%;
    background: #2a2a2a;
    border-bottom: 3px solid var(--red);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    letter-spacing: .13em;
    text-transform: uppercase;
    color: #bbb;
    line-height: 1.15;
  }
  .header-title span { color: var(--red); display: block; font-size: 1.3rem; }
  .scores {
    display: flex;
    gap: 20px;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .score-box { text-align: center; }
  .score-val {
    font-size: 1.8rem;
    font-weight: 900;
    line-height: 1;
  }
  .score-lbl {
    font-size: .6rem;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: #888;
    margin-top: 2px;
  }
  .p1-color { color: var(--red); }
  .p2-color { color: #2C6E8A; }
  #game-container {
    flex: 1;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
  }
  canvas {
    display: block;
    background: #111;
    border: 2px solid #3a3a3a;
    border-radius: 4px;
    touch-action: none;
  }
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #overlay.show { display: flex; }
  .overlay-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 2.4rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--red);
  }
  .overlay-sub {
    font-size: 1rem;
    color: #999;
  }
  .btn {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: .95rem;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 12px 28px;
    border: none;
    cursor: pointer;
    border-radius: 3px;
    background: var(--red);
    color: #fff;
    transition: background .15s;
  }
  .btn:hover { background: #e0063f; }
</style>
</head>
<body>
<header>
  <div class="header-title"><span>Pong</span>Way Ahead Challenge</div>
  <div class="scores">
    <div class="score-box">
      <div class="score-val p1-color" id="score1">0</div>
      <div class="score-lbl">You</div>
    </div>
    <div class="score-box">
      <div class="score-val p2-color" id="score2">0</div>
      <div class="score-lbl">CPU</div>
    </div>
  </div>
</header>
<div id="game-container">
  <canvas id="c"></canvas>
</div>
<div id="overlay" class="show">
  <div class="overlay-title" id="overlay-title">Ahola Pong</div>
  <div class="overlay-sub" id="overlay-sub">First to 5 wins. Drag or touch to move your paddle.</div>
  <button class="btn" id="overlay-btn" onclick="startGame()">Start Game</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const container = document.getElementById('game-container');

const WIN_SCORE = 5;
const PADDLE_W_RATIO = 0.03;
const PADDLE_H_RATIO = 0.22;
const BALL_R_RATIO = 0.015;
const BALL_SPEED_RATIO = 0.006;
const CPU_SPEED_RATIO = 0.004;
const PADDLE_MARGIN_RATIO = 0.04;

let W, H, paddleW, paddleH, ballR, ballSpeed, cpuSpeed, paddleMargin;
let p1Y, p2Y, ballX, ballY, ballVX, ballVY;
let score1 = 0, score2 = 0;
let running = false;
let animFrame = null;
let lastTime = 0;

function resize() {
  const maxW = container.clientWidth - 16;
  const maxH = container.clientHeight - 16;
  // Keep 3:4 aspect ratio (portrait-friendly)
  const aspect = 3 / 4;
  if (maxW / maxH > aspect) {
    H = maxH;
    W = Math.floor(H * aspect);
  } else {
    W = maxW;
    H = Math.floor(W / aspect);
  }
  canvas.width = W;
  canvas.height = H;
  recalcSizes();
}

function recalcSizes() {
  paddleW = Math.max(8, Math.round(W * PADDLE_W_RATIO));
  paddleH = Math.max(40, Math.round(H * PADDLE_H_RATIO));
  ballR = Math.max(5, Math.round(Math.min(W, H) * BALL_R_RATIO));
  ballSpeed = Math.max(2, H * BALL_SPEED_RATIO);
  cpuSpeed = Math.max(1.5, H * CPU_SPEED_RATIO);
  paddleMargin = Math.max(6, Math.round(W * PADDLE_MARGIN_RATIO));
}

function resetBall(direction) {
  ballX = W / 2;
  ballY = H / 2;
  const angle = (Math.random() * 0.8 - 0.4); // slight random angle
  ballVX = Math.cos(angle) * ballSpeed * (direction || (Math.random() < 0.5 ? 1 : -1));
  ballVY = Math.sin(angle) * ballSpeed;
}

function initPositions() {
  p1Y = H / 2 - paddleH / 2;
  p2Y = H / 2 - paddleH / 2;
  resetBall();
}

// --- Drawing ---
function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function drawBall() {
  ctx.beginPath();
  ctx.arc(ballX, ballY, ballR, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

function drawDashedLine() {
  ctx.setLineDash([6, 8]);
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(W / 2, 0);
  ctx.lineTo(W / 2, H);
  ctx.stroke();
  ctx.setLineDash([]);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawDashedLine();
  // Player paddle (left, red)
  drawRect(paddleMargin, p1Y, paddleW, paddleH, '#CB043E');
  // CPU paddle (right, blue)
  drawRect(W - paddleMargin - paddleW, p2Y, paddleW, paddleH, '#2C6E8A');
  drawBall();
}

// --- Game loop ---
function update(dt) {
  if (!running) return;
  const step = dt / 16.67; // normalize to ~60fps

  // Move ball
  ballX += ballVX * step;
  ballY += ballVY * step;

  // Top/bottom bounce
  if (ballY - ballR <= 0) { ballY = ballR; ballVY = Math.abs(ballVY); }
  if (ballY + ballR >= H) { ballY = H - ballR; ballVY = -Math.abs(ballVY); }

  // Player paddle collision (left)
  const p1Left = paddleMargin;
  const p1Right = paddleMargin + paddleW;
  if (ballVX < 0 && ballX - ballR <= p1Right && ballX + ballR >= p1Left &&
      ballY >= p1Y && ballY <= p1Y + paddleH) {
    ballX = p1Right + ballR;
    const hitPos = (ballY - p1Y) / paddleH - 0.5; // -0.5 to 0.5
    const angle = hitPos * 1.2; // max ~68 degrees
    const speed = Math.sqrt(ballVX * ballVX + ballVY * ballVY) * 1.03; // slight speedup
    ballVX = Math.cos(angle) * speed;
    ballVY = Math.sin(angle) * speed;
  }

  // CPU paddle collision (right)
  const p2Left = W - paddleMargin - paddleW;
  const p2Right = W - paddleMargin;
  if (ballVX > 0 && ballX + ballR >= p2Left && ballX - ballR <= p2Right &&
      ballY >= p2Y && ballY <= p2Y + paddleH) {
    ballX = p2Left - ballR;
    const hitPos = (ballY - p2Y) / paddleH - 0.5;
    const angle = Math.PI - hitPos * 1.2;
    const speed = Math.sqrt(ballVX * ballVX + ballVY * ballVY) * 1.03;
    ballVX = Math.cos(angle) * speed;
    ballVY = Math.sin(angle) * speed;
  }

  // CPU AI - follow ball with some lag
  const cpuCenter = p2Y + paddleH / 2;
  const diff = ballY - cpuCenter;
  const maxMove = cpuSpeed * step;
  if (Math.abs(diff) > maxMove) {
    p2Y += diff > 0 ? maxMove : -maxMove;
  } else {
    p2Y += diff;
  }
  p2Y = Math.max(0, Math.min(H - paddleH, p2Y));

  // Score
  if (ballX - ballR <= 0) {
    score2++;
    updateScores();
    if (score2 >= WIN_SCORE) { endGame('CPU Wins!'); return; }
    resetBall(1);
  }
  if (ballX + ballR >= W) {
    score1++;
    updateScores();
    if (score1 >= WIN_SCORE) { endGame('You Win!'); return; }
    resetBall(-1);
  }
}

function loop(time) {
  if (!running) return;
  const dt = lastTime ? Math.min(time - lastTime, 50) : 16.67;
  lastTime = time;
  update(dt);
  draw();
  animFrame = requestAnimationFrame(loop);
}

function updateScores() {
  document.getElementById('score1').textContent = score1;
  document.getElementById('score2').textContent = score2;
}

function startGame() {
  score1 = 0;
  score2 = 0;
  updateScores();
  resize();
  initPositions();
  running = true;
  lastTime = 0;
  document.getElementById('overlay').classList.remove('show');
  animFrame = requestAnimationFrame(loop);
}

function endGame(msg) {
  running = false;
  if (animFrame) cancelAnimationFrame(animFrame);
  document.getElementById('overlay-title').textContent = msg;
  document.getElementById('overlay-sub').textContent = `Score: ${score1} - ${score2}`;
  document.getElementById('overlay-btn').textContent = 'Play Again';
  document.getElementById('overlay').classList.add('show');
}

// --- Touch / Mouse controls ---
function getCanvasY(clientY) {
  const rect = canvas.getBoundingClientRect();
  return clientY - rect.top;
}

function movePaddle(clientY) {
  const y = getCanvasY(clientY) - paddleH / 2;
  p1Y = Math.max(0, Math.min(H - paddleH, y));
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); movePaddle(e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); movePaddle(e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('mousemove', e => { if (running) movePaddle(e.clientY); });
canvas.addEventListener('mousedown', e => { movePaddle(e.clientY); });

// Also allow touch anywhere on the page (not just canvas)
document.addEventListener('touchmove', e => {
  if (running) {
    e.preventDefault();
    movePaddle(e.touches[0].clientY);
  }
}, { passive: false });

// --- Resize handling ---
window.addEventListener('resize', () => {
  resize();
  if (!running) draw();
});

// Initial sizing
resize();
initPositions();
draw();
</script>
</body>
</html>
