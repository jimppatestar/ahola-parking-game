<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ahola Transport – WAY AHEAD Parking Puzzle</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap');
  :root { --red:#CB043E; --dark:#3C3C3B; --grey:#E3E3E3; --cell:74px; }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#181818;font-family:'Barlow',sans-serif;color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;}
  header{width:100%;background:#2a2a2a;border-bottom:3px solid var(--red);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;}
  .logo-area{display:flex;align-items:center;gap:14px;}
  .logo-svg{width:220px;height:auto;}
  .logo-svg .cls-1{fill:#ffffff !important;}
  .header-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:1rem;letter-spacing:.13em;text-transform:uppercase;color:#bbb;line-height:1.15;}
  .header-title span{color:var(--red);display:block;font-size:1.3rem;}
  .header-stats{display:flex;gap:24px;}
  .stat-box{text-align:center;}
  .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:900;color:var(--red);line-height:1;}
  .stat-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:#888;margin-top:2px;}
  main{display:flex;gap:24px;padding:24px 16px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
  .level-panel{background:#222;border:1px solid #333;border-radius:4px;padding:18px 14px;width:196px;flex-shrink:0;}
  .panel-title{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.68rem;text-transform:uppercase;letter-spacing:.14em;color:#777;margin-bottom:10px;border-bottom:1px solid #333;padding-bottom:7px;}
  .level-btn{display:block;width:100%;padding:8px 10px;margin-bottom:4px;background:#181818;border:1px solid #2e2e2e;border-radius:3px;color:#bbb;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:600;letter-spacing:.05em;cursor:pointer;text-align:left;transition:all .13s;position:relative;}
  .level-btn:hover{background:#262626;border-color:var(--red);color:#fff;}
  .level-btn.active{background:var(--red);border-color:var(--red);color:#fff;}
  .level-btn .diff{float:right;font-size:.67rem;opacity:.65;font-weight:400;}
  .level-btn .solved-mark{position:absolute;right:8px;color:#5cb85c;font-size:.9rem;}
  .instructions{margin-top:18px;padding-top:12px;border-top:1px solid #2e2e2e;font-size:.76rem;color:#777;line-height:1.65;}
  .instructions strong{color:#bbb;}
  .game-area{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .level-header{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.35rem;letter-spacing:.08em;text-transform:uppercase;color:#fff;text-align:center;}
  .level-header span{color:var(--red);}
  .grid-wrapper{position:relative;}
  .exit-marker{position:absolute;right:-30px;top:calc(2*var(--cell) + var(--cell)/2 - 14px);width:0;height:0;border-top:14px solid transparent;border-bottom:14px solid transparent;border-left:26px solid var(--red);filter:drop-shadow(0 0 5px rgba(203,4,62,.7));animation:pex 1.6s ease-in-out infinite;}
  @keyframes pex{0%,100%{opacity:1;transform:translateX(0);}50%{opacity:.55;transform:translateX(5px);}}
  .exit-label{position:absolute;right:-66px;top:calc(2*var(--cell) + var(--cell)/2 + 16px);font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.1em;color:var(--red);text-transform:uppercase;text-align:center;width:56px;}
  #grid{display:grid;grid-template-columns:repeat(6,var(--cell));grid-template-rows:repeat(6,var(--cell));position:relative;background:#111;border:2px solid #3a3a3a;box-shadow:0 8px 48px rgba(0,0,0,.7);}
  .cell{width:var(--cell);height:var(--cell);border:1px solid #1f1f1f;background:#141414;}
  .cell[data-r="2"]{background:#161818;}
  .vehicle{position:absolute;cursor:grab;user-select:none;z-index:10;transition:filter .1s;}
  .vehicle:active{cursor:grabbing;}
  .vehicle.dragging{z-index:100;filter:brightness(1.2) drop-shadow(0 4px 18px rgba(0,0,0,.8));}
  .btn-row{display:flex;gap:10px;}
  .btn{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.88rem;letter-spacing:.1em;text-transform:uppercase;padding:9px 20px;border:none;cursor:pointer;border-radius:3px;transition:all .13s;}
  .btn-primary{background:var(--red);color:#fff;}
  .btn-primary:hover{background:#e0063f;transform:translateY(-1px);}
  .btn-secondary{background:#2e2e2e;color:#bbb;border:1px solid #3a3a3a;}
  .btn-secondary:hover{background:#363636;color:#fff;}
  #win-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;}
  #win-overlay.show{display:flex;animation:fi .35s ease;}
  @keyframes fi{from{opacity:0;}to{opacity:1;}}
  .win-box{background:#222;border:2px solid var(--red);border-radius:6px;padding:36px 52px;text-align:center;max-width:420px;}
  .win-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:3rem;text-transform:uppercase;letter-spacing:.06em;color:var(--red);line-height:1;margin-bottom:6px;}
  .win-sub{font-size:.9rem;color:#999;margin-bottom:20px;line-height:1.55;}
  .win-moves{font-family:'Barlow Condensed',sans-serif;font-size:1.9rem;font-weight:700;color:#fff;margin-bottom:26px;}
  .win-moves span{color:var(--red);}
  @media(max-width:580px){:root{--cell:52px;}.level-panel{display:none;}.logo-svg{width:110px;}}
</style>
</head>

<main>
  <div class="level-panel">
    <div class="panel-title">Select Level</div>
    <div id="level-list"></div>
    <div class="instructions">
      <strong>How to play:</strong><br>
      Slide trucks to clear a path for the <span style="color:#ffffff;background:#CB043E;padding:0 4px;border-radius:2px;font-weight:700">white AHOLA truck</span> (row 3).<br><br>
      Get it to the <span style="color:var(--red)">exit →</span><br><br>
      Trucks only slide along their own axis.<br><br>
      <strong>Drag</strong> with mouse or touch.
    </div>
  </div>
  <div class="game-area">
    <div class="level-header"><span id="lh-name">L1 Morning Rush</span></div>
    <div class="grid-wrapper">
      <div id="grid"></div>
      <div class="exit-marker"></div>
      <div class="exit-label">EXIT</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="resetLevel()">↺ Reset</button>
      <button class="btn btn-primary" onclick="nextLevel()">Next Level →</button>
    </div>
  </div>
</main>

// ── Color helpers ──
function lighten(h,a){let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.min(255,r+a)},${Math.min(255,g+a)},${Math.min(255,b+a)})`;}
function darken(h,a){let r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.max(0,r-a)},${Math.max(0,g-a)},${Math.max(0,b-a)})`;}

// ── Draw realistic truck top-view as inline SVG ──
// Truck always drawn pointing RIGHT (cab at right end), then rotated for V.
// Viewport units: each grid cell = 100 units wide, 44 units tall in the truck's direction.
function makeTruckSVG(v, pxW, pxH) {
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('xmlns',ns);
  svg.setAttribute('width',pxW);
  svg.setAttribute('height',pxH);

  const U=100; // units per grid cell in length direction
  const BW=44; // body width in cross direction units
  const TL=v.len*U; // total truck length in units

  // For vertical trucks we rotate the whole drawing
  // viewBox stays as if the truck is horizontal, then we rotate+swap
  if(v.dir==='V'){
    svg.setAttribute('viewBox',`0 0 ${BW} ${TL}`);
    // Draw in a group rotated -90 deg about the svg center, translated to compensate
    const cx=BW/2, cy=TL/2;
    const g=document.createElementNS(ns,'g');
    // rotate 90° so right-pointing becomes downward-pointing
    g.setAttribute('transform',`translate(${BW},0) rotate(90) translate(0,0)`);
    // After rotation: x→y, y→-x. We need the truck to point downward.
    // Simpler: just draw with swapped axes
    drawTruck(ns,g,v,TL,BW,true);
    svg.appendChild(g);
  } else {
    svg.setAttribute('viewBox',`0 0 ${TL} ${BW}`);
    const g=document.createElementNS(ns,'g');
    drawTruck(ns,g,v,TL,BW,false);
    svg.appendChild(g);
  }
  return svg;
}

function el(ns,parent,tag,attrs,txt){
  const e=document.createElementNS(ns,tag);
  for(const[k,v2]of Object.entries(attrs))e.setAttribute(k,v2);
  if(txt!==undefined)e.textContent=txt;
  parent.appendChild(e);
  return e;
}

function drawTruck(ns,g,v,tLen,bWidth,isVertical){
  // Top-view truck: cab on RIGHT (front/headlights), trailer on LEFT (rear).
  // Style: distinct cab + trailer body, wheels along sides, no visible axle bar.
  const col = v.color;
  const cDark = darken(col,28);
  const cLight = lighten(col,22);
  const isTarget = v.id==='T';
  const BW = bWidth;

  const WW = 11;       // wheel length along truck axis
  const WH = 7;        // wheel thickness across body
  const WY_top = 1;
  const WY_bot = BW - WH - 1;

  const cabW = Math.max(14, Math.round(tLen * 0.14));
  const trailerW = tLen - cabW;
  const bodyFill = isTarget ? '#ffffff' : col;
  const cabFill  = isTarget ? '#ffffff' : cDark;

  // ── Shadow ──
  el(ns,g,'rect',{x:3,y:3,width:tLen-4,height:BW-4,fill:'rgba(0,0,0,0.45)',rx:4});

  // ── TRAILER body ──
  el(ns,g,'rect',{x:0,y:0,width:trailerW,height:BW,fill:bodyFill,rx:3});
  el(ns,g,'rect',{x:4,y:2,width:trailerW-8,height:Math.round(BW*0.18),fill:isTarget?'rgba(180,180,180,0.3)':'rgba(255,255,255,0.18)',rx:1});
  el(ns,g,'rect',{x:0,y:BW-Math.round(BW*0.18),width:trailerW,height:Math.round(BW*0.18),fill:isTarget?'rgba(0,0,0,0.06)':cDark,rx:0});
  el(ns,g,'rect',{x:0,y:0,width:trailerW,height:BW,fill:'none',stroke:isTarget?'#aaa':cDark,'stroke-width':'1.5',rx:3});

  // ── CAB body ──
  el(ns,g,'rect',{x:trailerW,y:2,width:cabW,height:BW-4,fill:cabFill,rx:4});
  // Windscreen (yellow tint like reference image)
  const wsX = trailerW + Math.round(cabW*0.26);
  const wsW = Math.round(cabW*0.42);
  const wsY = Math.round(BW*0.18);
  const wsH = Math.round(BW*0.64);
  el(ns,g,'rect',{x:wsX,y:wsY,width:wsW,height:wsH,fill:'rgba(210,210,210,0.9)',rx:2});
  // Cab front face
  el(ns,g,'rect',{x:tLen-6,y:3,width:6,height:BW-6,fill:isTarget?'#dddddd':cDark,rx:2});
  // Headlights
  el(ns,g,'rect',{x:tLen-5,y:5,width:5,height:6,fill:'rgba(255,248,160,0.97)',rx:1});
  el(ns,g,'rect',{x:tLen-5,y:BW-11,width:5,height:6,fill:'rgba(255,248,160,0.97)',rx:1});
  // Cab outline
  el(ns,g,'rect',{x:trailerW,y:2,width:cabW,height:BW-4,fill:'none',stroke:isTarget?'#aaa':'#000','stroke-width':'1',rx:4});

  // ── AHOLA label on trailer ──
  if(isTarget){
    el(ns,g,'text',{
      x:trailerW/2, y:BW/2+5,
      'text-anchor':'middle',
      'font-family':"'Barlow Condensed',Arial,sans-serif",
      'font-weight':'900','font-size':'14',
      fill:'#CB043E','letter-spacing':'3'
    },'AHOLA');
  }

  // ── WHEELS along trailer sides (no axle bar) ──
  // Rear axle
  const rearX = 5;
  el(ns,g,'rect',{x:rearX,y:WY_top,width:WW,height:WH,fill:'#1a1a1a',rx:2});
  el(ns,g,'rect',{x:rearX,y:WY_bot,width:WW,height:WH,fill:'#1a1a1a',rx:2});
  // Mid axle (len>=3 only)
  if(v.len>=3){
    const midX = Math.round(trailerW/2) - Math.round(WW/2);
    el(ns,g,'rect',{x:midX,y:WY_top,width:WW,height:WH,fill:'#1a1a1a',rx:2});
    el(ns,g,'rect',{x:midX,y:WY_bot,width:WW,height:WH,fill:'#1a1a1a',rx:2});
  }
  // Drive axle (just behind cab)
  const driveX = trailerW - WW - 5;
  el(ns,g,'rect',{x:driveX,y:WY_top,width:WW,height:WH,fill:'#1a1a1a',rx:2});
  el(ns,g,'rect',{x:driveX,y:WY_bot,width:WW,height:WH,fill:'#1a1a1a',rx:2});
  // Steer axle (under cab)
  const steerX = trailerW + Math.round(cabW*0.54) - Math.round(WW/2);
  el(ns,g,'rect',{x:steerX,y:WY_top,width:WW,height:WH,fill:'#1a1a1a',rx:2});
  el(ns,g,'rect',{x:steerX,y:WY_bot,width:WW,height:WH,fill:'#1a1a1a',rx:2});
}

// ── Collision helpers ──
function canMoveFrom(id,toCol,toRow){
  const g=Array.from({length:GS},()=>Array(GS).fill(null));
  for(const v of vehicles){
    if(v.id===id)continue;
    for(let i=0;i<v.len;i++){
      const r=v.dir==="H"?v.row:v.row+i;
      const c=v.dir==="H"?v.col+i:v.col;
      if(r>=0&&r<GS&&c>=0&&c<GS)g[r][c]=v.id;
    }
  }
  const mv=vehicles.find(v=>v.id===id);
  for(let i=0;i<mv.len;i++){
    const r=mv.dir==="H"?toRow:toRow+i;
    const c=mv.dir==="H"?toCol+i:toCol;
    if(mv.id==="T"&&mv.dir==="H"&&c>=GS)continue;
    if(r<0||r>=GS||c<0||c>=GS)return false;
    if(g[r][c])return false;
  }
  return true;
}
function checkWin(){const t=vehicles.find(v=>v.id==="T");return t&&t.dir==="H"&&t.row===2&&t.col+t.len>=GS;}

// ── Render ──
function cellPx(){return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'))||74;}

function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  const CP=cellPx();
  for(let r=0;r<GS;r++)for(let c=0;c<GS;c++){
    const cell=document.createElement('div');
    cell.className='cell';cell.dataset.r=r;cell.dataset.c=c;
    grid.appendChild(cell);
  }
  const GAP=3;
  for(const v of vehicles){
    const vW=v.dir==="H"?v.len*CP-GAP*2:CP-GAP*2;
    const vH=v.dir==="V"?v.len*CP-GAP*2:CP-GAP*2;
    const el2=document.createElement('div');
    el2.className='vehicle';el2.dataset.id=v.id;
    el2.style.cssText=`width:${vW}px;height:${vH}px;left:${v.col*CP+GAP}px;top:${v.row*CP+GAP}px;`;
    const svg=makeTruckSVG(v,vW,vH);
    svg.style.display='block';
    el2.appendChild(svg);
    el2.addEventListener('mousedown',startDrag);
    el2.addEventListener('touchstart',startTouchDrag,{passive:false});
    grid.appendChild(el2);
  }
  const mc=document.getElementById('move-counter');if(mc)mc.textContent=moves;
}

// ── Drag ──
function startDrag(e){
  e.preventDefault();
  const id=e.currentTarget.dataset.id,v=vehicles.find(x=>x.id===id);
  dragState={v,el:e.currentTarget,startX:e.clientX,startY:e.clientY,origCol:v.col,origRow:v.row,won:false};
  e.currentTarget.classList.add('dragging');
  document.addEventListener('mousemove',onDrag);document.addEventListener('mouseup',endDrag);
}
function startTouchDrag(e){
  e.preventDefault();
  const t=e.touches[0],id=e.currentTarget.dataset.id,v=vehicles.find(x=>x.id===id);
  dragState={v,el:e.currentTarget,startX:t.clientX,startY:t.clientY,origCol:v.col,origRow:v.row,won:false};
  e.currentTarget.classList.add('dragging');
  document.addEventListener('touchmove',onTouchDrag,{passive:false});document.addEventListener('touchend',endTouchDrag);
}
function onDrag(e){if(dragState)handleMove(e.clientX,e.clientY);}
function onTouchDrag(e){e.preventDefault();if(dragState)handleMove(e.touches[0].clientX,e.touches[0].clientY);}
function handleMove(cx,cy){
  const{v,el,startX,startY,origCol,origRow}=dragState;
  const CP=cellPx(),GAP=3;
  if(v.dir==="H"){
    const delta=Math.round((cx-startX)/CP);
    let fc=origCol;
    if(delta>0){for(let d=1;d<=delta;d++){if(canMoveFrom(v.id,origCol+d,origRow))fc=origCol+d;else break;}}
    else if(delta<0){for(let d=-1;d>=delta;d--){if(canMoveFrom(v.id,origCol+d,origRow))fc=origCol+d;else break;}}
    if(fc!==v.col){v.col=fc;el.style.left=`${fc*CP+GAP}px`;if(v.id==="T"&&v.col+v.len>=GS)dragState.won=true;}
  }else{
    const delta=Math.round((cy-startY)/CP);
    let fr=origRow;
    if(delta>0){for(let d=1;d<=delta;d++){if(canMoveFrom(v.id,origCol,origRow+d))fr=origRow+d;else break;}}
    else if(delta<0){for(let d=-1;d>=delta;d--){if(canMoveFrom(v.id,origCol,origRow+d))fr=origRow+d;else break;}}
    if(fr!==v.row){v.row=fr;el.style.top=`${fr*CP+GAP}px`;}
  }
}
function endDrag(){document.removeEventListener('mousemove',onDrag);document.removeEventListener('mouseup',endDrag);finishDrag();}
function endTouchDrag(){document.removeEventListener('touchmove',onTouchDrag);document.removeEventListener('touchend',endTouchDrag);finishDrag();}
function finishDrag(){
  if(!dragState)return;
  const{v,el,origCol,origRow,won}=dragState;
  if(v.col!==origCol||v.row!==origRow)moves++;
  el.classList.remove('dragging');
  const didWin=won||checkWin();
  dragState=null;
  renderGrid();
  const mc=document.getElementById('move-counter');if(mc)mc.textContent=moves;
  if(didWin)setTimeout(showWin,250);
}

// ── Win ──
function showWin(){solved.add(curLevel);saveSolved();const wm=document.getElementById('win-moves-num');if(wm)wm.textContent=moves;document.getElementById('win-overlay').classList.add('show');updateLevelList();}
function closeWin(){document.getElementById('win-overlay').classList.remove('show');}

// ── Levels ──
function loadLevel(idx){
  curLevel=idx;moves=0;
  vehicles=LEVELS[idx].vehicles.map(v=>({...v}));
  const ld=document.getElementById('level-display');if(ld)ld.textContent=idx+1;
  const ln=document.getElementById('lh-name');if(ln)ln.textContent=LEVELS[idx].name;
  renderGrid();updateLevelList();
}
function resetLevel(){loadLevel(curLevel);}
function nextLevel(){closeWin();loadLevel((curLevel+1)%LEVELS.length);}
function updateLevelList(){
  const c=document.getElementById('level-list');c.innerHTML='';
  LEVELS.forEach((lvl,i)=>{
    const btn=document.createElement('button');
    btn.className=`level-btn${i===curLevel?' active':''}`;
    btn.innerHTML=`${lvl.name}`;
    if(solved.has(i)){const m=document.createElement('span');m.className='solved-mark';m.textContent='✓';btn.appendChild(m);}
    btn.onclick=()=>{closeWin();loadLevel(i);};
    c.appendChild(btn);
  });
}
updateLevelList();loadLevel(0);
</script>
</body>
</html>
